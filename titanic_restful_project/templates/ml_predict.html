<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>乘客生存預測</title>
    <style>
        :root {
            --page: #f4ecd8;
            --surface: #faf4e6;
            --ink: #1c1710;
            --ink-2: #5b4f3a;
            --ink-muted: #8a7b60;
            --hairline: #ddd0b0;
            --rule: #1c1710;
            --good: #0ca30c;
            --good-wash: #e4efdd;
            --critical: #d03b3b;
            --critical-wash: #f5e2e0;
            --link: #5b4f3a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page: #14110c;
                --surface: #1c1712;
                --ink: #efe6cf;
                --ink-2: #c9bc9c;
                --ink-muted: #8a7b60;
                --hairline: #372e21;
                --rule: #efe6cf;
                --good: #0ca30c;
                --good-wash: #172417;
                --critical: #d03b3b;
                --critical-wash: #2a1a19;
                --link: #c9bc9c;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
            margin: 0;
            padding: 30px 16px 60px;
            background-color: var(--page);
            color: var(--ink);
            line-height: 1.6;
        }

        .sheet {
            max-width: 900px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--hairline);
            padding: 24px 30px 34px;
        }

        .kicker-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-muted);
            border-bottom: 1px solid var(--hairline);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        h1 {
            text-align: center;
            font-size: clamp(26px, 4.5vw, 38px);
            letter-spacing: 0.02em;
            margin: 4px 0 10px;
            border-bottom: 4px double var(--rule);
            padding-bottom: 12px;
        }

        h2 {
            font-size: 15px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            border-bottom: 1px solid var(--hairline);
            padding-bottom: 6px;
            margin: 0 0 14px;
        }

        p.nav-links {
            text-align: center;
            font-size: 13px;
        }

        a {
            text-decoration: none;
            color: var(--link);
            border-bottom: 1px dotted var(--link);
        }

        a:hover {
            border-bottom-style: solid;
        }

        label {
            display: block;
            margin-top: 12px;
            font-size: 13px;
            color: var(--ink-2);
        }

        input,
        select {
            padding: 7px 9px;
            width: 100%;
            max-width: 320px;
            font-family: inherit;
            font-size: 13.5px;
            background-color: var(--surface);
            border: 1px solid var(--hairline);
            color: var(--ink);
            margin-top: 4px;
        }

        button {
            margin-top: 18px;
            padding: 9px 20px;
            font-size: 14px;
            font-family: inherit;
            letter-spacing: 0.03em;
            background-color: var(--ink);
            color: var(--surface);
            border: 1px solid var(--ink);
            cursor: pointer;
        }

        button:hover {
            background-color: var(--surface);
            color: var(--ink);
        }

        .table-wrap {
            overflow-x: auto;
            max-width: 100%;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 14px;
            min-width: 640px;
        }

        th,
        td {
            border-bottom: 1px solid var(--hairline);
            padding: 8px 10px;
            font-size: 13.5px;
            text-align: left;
            font-variant-numeric: tabular-nums;
        }

        th {
            border-bottom: 2px solid var(--rule);
            color: var(--ink-2);
            font-size: 11.5px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 700;
        }

        section {
            max-width: 100%;
            margin-bottom: 26px;
            padding: 16px 18px 18px;
            border: 1px solid var(--hairline);
        }

        .result-box {
            margin-top: 16px;
            padding: 12px 16px;
            border: 1px solid var(--ink);
            max-width: 500px;
            font-size: 14px;
        }

        .survived {
            color: var(--good);
            font-weight: 700;
        }

        .not-survived {
            color: var(--critical);
            font-weight: 700;
        }

        .warning {
            border: 1px solid var(--critical);
            background-color: var(--critical-wash);
            color: var(--ink);
            padding: 10px 14px;
            font-size: 13.5px;
            margin-bottom: 20px;
        }
    </style>
</head>

<body>
    <div class="sheet">
        <div class="kicker-row">
            <span>乘客生存預測</span>
            <span>模型即時推論</span>
        </div>

        <h1>乘客生存預測</h1>
        <p class="nav-links"><a href="/">回首頁</a> ｜ <a href="/ml/train">前往模型訓練</a></p>

        <p id="modelWarning" class="warning" style="display: none;">
            尚未訓練模型，請先到「模型訓練」頁面完成訓練，才能進行預測。
        </p>

        <section>
            <h2>單筆預測</h2>

            <form id="predictForm">
                <label>艙等 Pclass</label>
                <select name="Pclass" required>
                    <option value="1">1 等艙</option>
                    <option value="2">2 等艙</option>
                    <option value="3" selected>3 等艙</option>
                </select>

                <label>性別 Sex</label>
                <select name="Sex" required>
                    <option value="male">male</option>
                    <option value="female">female</option>
                </select>

                <label>年齡 Age</label>
                <input name="Age" type="number" step="0.01" min="0" max="120">

                <label>同行兄弟姊妹/配偶數 SibSp</label>
                <input name="SibSp" type="number" min="0" value="0">

                <label>同行父母/子女數 Parch</label>
                <input name="Parch" type="number" min="0" value="0">

                <label>票價 Fare</label>
                <input name="Fare" type="number" step="0.0001" min="0" value="0">

                <label>登船港口 Embarked</label>
                <select name="Embarked">
                    <option value="">未知</option>
                    <option value="C">C</option>
                    <option value="Q">Q</option>
                    <option value="S">S</option>
                </select>

                <button type="submit">預測</button>
            </form>

            <div id="singleResult" class="result-box" style="display: none;"></div>
        </section>

        <section>
            <h2>CSV 批次預測</h2>
            <p>CSV 檔案需包含欄位：Pclass, Sex, Age, SibSp, Parch, Fare, Embarked（可另外附上 PassengerId、Name 方便對照）。</p>

            <form id="batchForm">
                <input type="file" name="file" accept=".csv" required>
                <button type="submit">上傳並預測</button>
            </form>

            <div id="batchResult"></div>
        </section>
    </div>

    <script>
        // 檢查目前是否已經有訓練完成的模型，沒有的話顯示提示訊息
        async function checkModelReady() {
            const response = await fetch("/api/ml/train/status");
            const state = await response.json();

            const warning = document.getElementById("modelWarning");
            warning.style.display = (state.status === "done") ? "none" : "block";
        }

        // 監聽單筆預測表單的 submit 事件
        document.getElementById("predictForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const form = event.target;
            const formData = new FormData(form);
            const data = Object.fromEntries(formData.entries());

            const response = await fetch("/api/ml/predict", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            const resultBox = document.getElementById("singleResult");
            resultBox.style.display = "block";

            if (!response.ok) {
                resultBox.innerHTML = `<span class="not-survived">${result.error}</span>`;
                return;
            }

            const survivedText = result.survived === 1
                ? `<span class="survived">存活</span>`
                : `<span class="not-survived">未存活</span>`;

            const probabilityPercent = (result.probability * 100).toFixed(2);

            resultBox.innerHTML = `
                預測結果：${survivedText}<br>
                生存機率：${probabilityPercent}%
            `;
        });

        // 監聽 CSV 批次上傳表單的 submit 事件
        document.getElementById("batchForm").addEventListener("submit", async function (event) {
            event.preventDefault();

            const form = event.target;
            const formData = new FormData(form);

            const response = await fetch("/api/ml/predict/batch", {
                method: "POST",
                body: formData
            });

            const result = await response.json();

            const batchResult = document.getElementById("batchResult");

            if (!response.ok) {
                batchResult.innerHTML = `<p class="not-survived">${result.error}</p>`;
                return;
            }

            renderBatchTable(result.items);
        });

        // 把批次預測的結果 render 成表格
        function renderBatchTable(items) {
            const batchResult = document.getElementById("batchResult");

            if (items.length === 0) {
                batchResult.innerHTML = "<p>CSV 沒有任何資料列</p>";
                return;
            }

            const columns = Object.keys(items[0]);

            let headerHtml = columns.map(col => `<th>${col}</th>`).join("");

            let rowsHtml = "";
            for (const item of items) {
                let cellsHtml = "";
                for (const col of columns) {
                    let value = item[col];

                    if (col === "PredictedSurvived") {
                        value = value === 1 ? `<span class="survived">存活</span>` : `<span class="not-survived">未存活</span>`;
                    } else if (col === "Probability") {
                        value = (value * 100).toFixed(2) + "%";
                    } else {
                        value = value ?? "";
                    }

                    cellsHtml += `<td>${value}</td>`;
                }
                rowsHtml += `<tr>${cellsHtml}</tr>`;
            }

            batchResult.innerHTML = `
                <p>共 ${items.length} 筆預測結果：</p>
                <div class="table-wrap">
                    <table>
                        <thead><tr>${headerHtml}</tr></thead>
                        <tbody>${rowsHtml}</tbody>
                    </table>
                </div>
            `;
        }

        checkModelReady();
    </script>
</body>

</html>
