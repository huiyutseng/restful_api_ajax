<!DOCTYPE html>
<html lang="zh-Hant">

<head>
    <meta charset="UTF-8">
    <title>Titanic 乘客資料管理</title>
    <style>
        :root {
            --page: #f4ecd8;
            --surface: #faf4e6;
            --ink: #1c1710;
            --ink-2: #5b4f3a;
            --ink-muted: #8a7b60;
            --hairline: #ddd0b0;
            --rule: #1c1710;
            --good: #0ca30c;
            --good-wash: #e4efdd;
            --critical: #d03b3b;
            --critical-wash: #f5e2e0;
            --link: #5b4f3a;
        }

        @media (prefers-color-scheme: dark) {
            :root {
                --page: #14110c;
                --surface: #1c1712;
                --ink: #efe6cf;
                --ink-2: #c9bc9c;
                --ink-muted: #8a7b60;
                --hairline: #372e21;
                --rule: #efe6cf;
                --good: #0ca30c;
                --good-wash: #172417;
                --critical: #d03b3b;
                --critical-wash: #2a1a19;
                --link: #c9bc9c;
            }
        }

        * {
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, "Times New Roman", "Noto Serif TC", serif;
            margin: 0;
            padding: 30px 16px 60px;
            background-color: var(--page);
            color: var(--ink);
            line-height: 1.6;
        }

        .sheet {
            max-width: 1000px;
            margin: 0 auto;
            background: var(--surface);
            border: 1px solid var(--hairline);
            padding: 24px 30px 34px;
        }

        .kicker-row {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            letter-spacing: 0.1em;
            text-transform: uppercase;
            color: var(--ink-muted);
            border-bottom: 1px solid var(--hairline);
            padding-bottom: 8px;
            margin-bottom: 10px;
        }

        h1 {
            text-align: center;
            font-size: clamp(26px, 4.5vw, 38px);
            letter-spacing: 0.02em;
            margin: 4px 0 10px;
            border-bottom: 4px double var(--rule);
            padding-bottom: 12px;
        }

        p.nav-links {
            text-align: center;
            font-size: 13px;
        }

        a {
            text-decoration: none;
            color: var(--link);
            border-bottom: 1px dotted var(--link);
        }

        a:hover {
            border-bottom-style: solid;
        }

        .toolbar {
            border: 1px solid var(--hairline);
            padding: 14px 16px;
            margin-top: 20px;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-wrap: wrap;
        }

        .toolbar input[type="text"] {
            padding: 7px 10px;
            font-family: inherit;
            font-size: 13.5px;
            background-color: var(--surface);
            border: 1px solid var(--hairline);
            color: var(--ink);
            min-width: 200px;
        }

        button {
            padding: 8px 18px;
            font-size: 13.5px;
            font-family: inherit;
            letter-spacing: 0.03em;
            background-color: var(--ink);
            color: var(--surface);
            border: 1px solid var(--ink);
            cursor: pointer;
        }

        button:hover {
            background-color: var(--surface);
            color: var(--ink);
        }

        #summary {
            margin-top: 12px;
            font-size: 12.5px;
            color: var(--ink-muted);
        }

        .table-wrap {
            overflow-x: auto;
            max-width: 100%;
        }

        table {
            border-collapse: collapse;
            width: 100%;
            margin-top: 10px;
            min-width: 760px;
        }

        th,
        td {
            border-bottom: 1px solid var(--hairline);
            padding: 8px 10px;
            font-size: 13.5px;
            text-align: left;
            font-variant-numeric: tabular-nums;
        }

        th {
            border-bottom: 2px solid var(--rule);
            color: var(--ink-2);
            font-size: 11.5px;
            letter-spacing: 0.06em;
            text-transform: uppercase;
            font-weight: 700;
        }

        td button {
            padding: 4px 10px;
            font-size: 12px;
        }

        .pagination {
            margin-top: 16px;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 13px;
        }
    </style>
</head>

<body>
    <div class="sheet">
        <div class="kicker-row">
            <span>乘客名冊管理</span>
            <span>titanic 資料表</span>
        </div>

        <h1>Titanic 乘客資料管理</h1>
        <p class="nav-links">
            <a href="/passengers/new">新增乘客</a>
            ｜
            <a href="/ml/train">模型訓練</a>
            ｜
            <a href="/ml/predict">乘客生存預測</a>
        </p>

        <div class="toolbar">
            <input type="text" id="searchInput" placeholder="搜尋姓名">
            <button onclick="loadPassengers(1)">查詢</button>
        </div>

        <div id="summary"></div>

        <div class="table-wrap">
            <table>
                <thead>
                    <tr>
                        <th>ID</th>
                        <th>姓名</th>
                        <th>性別</th>
                        <th>年齡</th>
                        <th>艙等</th>
                        <th>是否生還</th>
                        <th>票價</th>
                        <th>登船港口</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="passengerTableBody"></tbody>
            </table>
        </div>

        <div class="pagination">
            <button onclick="prevPage()">上一頁</button>
            <span id="pageInfo"></span>
            <button onclick="nextPage()">下一頁</button>
        </div>
    </div>

    <script>
        // 定義全域變數 currentPage、perPage 和 total，
        // 分別用來記錄目前的頁碼、每頁顯示的資料筆數，以及資料的總筆數。
        let currentPage = 1;
        const perPage = 20;
        let total = 0;

        // 定義一個名為 loadPassengers 的非同步函式，接受一個 page 參數，預設值為 1。
        async function loadPassengers(page = 1) {
            // 取得目前的頁碼，並把它存到 currentPage 變數中。
            currentPage = page;

            // 取得搜尋輸入框的值，存到 search 變數中。
            const search = document.getElementById("searchInput").value;

            // 使用 URLSearchParams 來建立查詢字串，包含 page、per_page 和 search 三個參數。
            // 這裡的查詢字串就是 Query String，會被附加在 URL 的後面，傳遞給後端 API。
            const params = new URLSearchParams({
                page: currentPage,
                per_page: perPage,
                search: search
            });

            // 使用 fetch API 來向後端 API 發送 GET 請求，URL 包含剛剛建立的查詢字串
            const response = await fetch(`/api/passengers?${params.toString()}`);

            // 當你需要更精確的錯誤訊息時，再加上 response.status 判斷即可，
            // 目前可以使用 response.ok 來判斷是否成功讀取資料，
            // 它通常會回傳 true 或 false，根據 HTTP 狀態碼來判斷是否成功，
            // HTTP status code 200-299 代表成功，其他則代表失敗。
            if (!response.ok) {
                alert("讀取資料失敗");
                return;
            }

            // 如果成功讀取資料，我們就把回傳的 JSON 格式資料解析出來，存到 data 變數中
            const data = await response.json();

            // 把 data 中的 total 屬性存到全域變數 total 中，得知資料的總筆數
            total = data.total;

            // 把資料顯示在表格
            renderTable(data.items);

            // 更新分頁資訊
            renderPagination(data.page, data.per_page, data.total);
        }

        // 定義一個名為 renderTable 的函式，接受一個 items 參數，
        // 這個參數是一個陣列，包含了要顯示在表格中的資料
        function renderTable(items) {
            const tbody = document.getElementById("passengerTableBody");
            tbody.innerHTML = "";

            for (const item of items) {
                const tr = document.createElement("tr");

                tr.innerHTML = `
                    <td>${item.PassengerId}</td>
                    <td>${item.Name}</td>
                    <td>${item.Sex}</td>
                    <td>${item.Age ?? ""}</td>
                    <td>${item.Pclass}</td>
                    <td>${item.Survived === 1 ? "生還" : "未生還"}</td>
                    <td>${item.Fare}</td>
                    <td>${item.Embarked ?? ""}</td>
                    <td>
                        <a href="/passengers/${item.PassengerId}/edit">編輯</a>
                        |
                        <button onclick="deletePassenger(${item.PassengerId})">刪除</button>
                    </td>
                `;

                tbody.appendChild(tr);
            }
        }

        // 顯示分頁資訊
        function renderPagination(page, perPage, total) {
            const totalPages = Math.ceil(total / perPage);

            document.getElementById("summary").textContent =
                `共有 ${total} 筆資料`;

            document.getElementById("pageInfo").textContent =
                `第 ${page} 頁 / 共 ${totalPages} 頁`;
        }

        // 當使用者點擊「上一頁」按鈕時，會呼叫這個函式。
        // 這個函式會檢查目前的頁碼是否大於 1，
        // 如果是，就呼叫 loadPassengers 函式，載入前一頁的資料。
        function prevPage() {
            if (currentPage > 1) {
                loadPassengers(currentPage - 1);
            }
        }

        // 當使用者點擊「下一頁」按鈕時，會呼叫這個函式。
        // 這個函式會先計算總頁數，然後檢查目前的頁碼是否小於總頁數，
        // 如果是，就呼叫 loadPassengers 函式，載入下一頁的資料。
        function nextPage() {
            const totalPages = Math.ceil(total / perPage);

            if (currentPage < totalPages) {
                loadPassengers(currentPage + 1);
            }
        }

        // 刪除的乘客 (透過 passengerId)。
        async function deletePassenger(passengerId) {
            // 在刪除之前，先顯示一個確認對話框，詢問使用者是否確定要刪除這筆資料
            const confirmed = confirm(`確定要刪除 PassengerId=${passengerId} 嗎？`);

            // 如果使用者點擊「取消」，就直接回傳，不執行刪除操作
            if (!confirmed) {
                return;
            }

            // 請求刪除乘客
            const response = await fetch(`/api/passengers/${passengerId}`, {
                method: "DELETE"
            });

            // 取得回傳的 JSON 格式資料，存到 result 變數中
            const result = await response.json()

            // 如果刪除失敗，會回傳一個 error 屬性，顯示錯誤訊息給使用者
            if (!response.ok) {
                alert(result.error || "刪除失敗");
                return;
            }

            alert("刪除成功");

            // 刪除成功後，重新載入目前頁碼的資料，使用者可以看到最新的資料列表
            loadPassengers(currentPage);
        }

        // 頁面載入完成後，會自動載入第一頁的資料
        loadPassengers();
    </script>
</body>

</html>
